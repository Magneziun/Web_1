<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>UI Library Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Inputs</h2>
<input class="input" placeholder="Enter some text">
<input class="input valid" value="valid text">
<input class="input invalid" value="invalid text">

<h2>Check boxes</h2>
<label class="checkbox">
    <input type="checkbox" checked>
    <span></span>
    Subscribe
</label>

<label class="checkbox red">
    <input type="checkbox" checked>
    <span></span>
    Subscribe
</label>

<h2>Radio buttons</h2>
<label class="radio">
    <input type="radio" name="gender" >
    <span></span>
    Male
</label>

<label class="radio">
    <input type="radio" name="gender" >
    <span></span>
    Female
</label>

<h2>Buttons</h2>
<button class="btn green">Active</button>
<button class="btn green hover">Hover</button>
<button class="btn red">Danger</button>
<button class="btn red hover">Hover</button>
<button class="btn disabled" disabled>Disabled</button>

<button class="circle green">+</button>
<button class="circle red">−</button>

<h2>Text area</h2>
<textarea class="textarea" placeholder="Enter some text..."></textarea>

</body>
</html>
