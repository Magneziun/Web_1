<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Title</title>

  <link rel="stylesheet" href="styles 2.css">
</head>
<body>
    <div class="container">
        <form class="form" id="formAuth" action="index.html">
            <div class="form-field">
                <label for="login">Логин</label>
                <input type="text" id="login" name="login" placeholder="Введите логин">
            </div>
            <div class="form-field">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password">
            </div>
            <div class="form-field">
                <button class="btn btn-signin" type="submit">Войти</button>
                <button class="btn" type="reset">Очистить</button>
            </div>
        </form>
    </div>

</body>
</html>
